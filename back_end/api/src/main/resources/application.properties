app.name=VALKYRAPP
developer.name=MARCOS
server.port=8080

# Conexion con la BBDD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Datos del SGBD
spring.datasource.url=jdbc:mysql://localhost:3306/valkyr_db
spring.datasource.username=root
spring.datasource.password=root

# Configuracion hibernate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# hbm2DDL
spring.jpa.hibernate.ddl-auto=validate

# Estrategia de nombrado
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Habilitar mensajes de error para que lleguen a Ionic
spring.web.error.include-message=always

# Apartado IA
spring.application.name=Valkyr
spring.ai.openai.api-key=${GROQ_API_KEY:gsk_YOUR_API_KEY_HERE}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile

# Configuracion Correo (SMTP Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:tu_correo@gmail.com}
spring.mail.password=${MAIL_PASSWORD:tu_contraseńa_de_aplicacion}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

